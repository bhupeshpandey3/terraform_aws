name: "CloudPilot Deploy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "CloudPilot project UUID (used for state isolation)"
        required: true
        type: string
      project_name:
        description: "Project slug (e.g. my-app)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      stack_type:
        description: "Infrastructure stack template"
        required: true
        type: choice
        options:
          - web-app
          - api-backend
          - static-site
          - microservices
        default: web-app
      aws_region:
        description: "AWS region"
        required: true
        type: string
        default: us-east-1
      container_image:
        description: "Container image URI"
        required: false
        type: string
        default: "public.ecr.aws/docker/library/nginx:stable-alpine"
      container_port:
        description: "Container port number"
        required: false
        type: string
        default: "80"
      enable_rds:
        description: "Provision RDS database (true/false)"
        required: false
        type: string
        default: "false"
      enable_cloudfront:
        description: "Provision CloudFront distribution (true/false)"
        required: false
        type: string
        default: "false"
      db_password:
        description: "Database master password (required only if enable_rds=true)"
        required: false
        type: string
        default: ""
      callback_url:
        description: "CloudPilot webhook URL for status callbacks"
        required: false
        type: string
        default: ""

jobs:
  deploy:
    name: "Deploy ${{ inputs.stack_type }} to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Resolve networking and naming
        id: net
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          PROJECT_ID: ${{ inputs.project_id }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          AZS=$(aws ec2 describe-availability-zones \
            --region "$AWS_REGION" \
            --query 'AvailabilityZones[?State==`available`].ZoneName' \
            --output json | jq -c '.[0:2]')
          AZ1=$(echo "$AZS" | jq -r '.[0]')
          AZ2=$(echo "$AZS" | jq -r '.[1]')
          echo "az1=$AZ1" >> $GITHUB_OUTPUT
          echo "az2=$AZ2" >> $GITHUB_OUTPUT

          S3_SUFFIX=$(echo "$PROJECT_ID" | tr -d '-' | cut -c1-8)
          RAW="${PROJECT_NAME}-${S3_SUFFIX}"
          S3_NAME=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | sed 's/^-*//;s/-*$//' | cut -c1-63)
          echo "s3_bucket=$S3_NAME" >> $GITHUB_OUTPUT

          DB_NAME=$(echo "$PROJECT_NAME" | tr '-' '_' | tr -cs 'a-z0-9_' '_' | cut -c1-63)
          echo "db_name=${DB_NAME:-appdb}" >> $GITHUB_OUTPUT

      - name: Generate Terraform Variables
        env:
          ENVIRONMENT:     ${{ inputs.environment }}
          PROJECT_NAME:    ${{ inputs.project_name }}
          AWS_REGION:      ${{ inputs.aws_region }}
          CONTAINER_IMAGE: ${{ inputs.container_image }}
          CONTAINER_PORT:  ${{ inputs.container_port }}
          ENABLE_RDS:      ${{ inputs.enable_rds }}
          ENABLE_CF:       ${{ inputs.enable_cloudfront }}
          DB_PASSWORD:     ${{ inputs.db_password }}
          S3_BUCKET:       ${{ steps.net.outputs.s3_bucket }}
          DB_NAME:         ${{ steps.net.outputs.db_name }}
          AZ1:             ${{ steps.net.outputs.az1 }}
          AZ2:             ${{ steps.net.outputs.az2 }}
        run: |
          case "${{ inputs.stack_type }}" in
            web-app)       ENABLE_S3=true;  ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
            api-backend)   ENABLE_S3=false; ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
            static-site)   ENABLE_S3=true;  ENABLE_ALB=false; ENABLE_ECS=false; ENABLE_ECR=false ;;
            microservices) ENABLE_S3=true;  ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
            *)             ENABLE_S3=true;  ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
          esac

          [[ "$ENVIRONMENT" == "prod" ]] && ENABLE_NAT=true || ENABLE_NAT=false
          [[ "$ENVIRONMENT" == "prod" ]] && ECS_COUNT=2 || ECS_COUNT=1

          export ENABLE_S3 ENABLE_ALB ENABLE_ECS ENABLE_ECR ENABLE_NAT ECS_COUNT

          python3 -c "
import json, os

data = {
    'environment':          os.environ['ENVIRONMENT'],
    'project_name':         os.environ['PROJECT_NAME'],
    'aws_region':           os.environ['AWS_REGION'],
    'vpc_cidr':             '10.0.0.0/16',
    'availability_zones':   [os.environ['AZ1'], os.environ['AZ2']],
    'public_subnet_cidrs':  ['10.0.1.0/24', '10.0.2.0/24'],
    'private_subnet_cidrs': ['10.0.10.0/24', '10.0.11.0/24'],
    'enable_s3':            os.environ['ENABLE_S3'] == 'true',
    'enable_alb':           os.environ['ENABLE_ALB'] == 'true',
    'enable_ecs':           os.environ['ENABLE_ECS'] == 'true',
    'enable_ecr':           os.environ['ENABLE_ECR'] == 'true',
    'enable_rds':           os.environ['ENABLE_RDS'] == 'true',
    'enable_nat_gateway':   os.environ['ENABLE_NAT'] == 'true',
    'enable_scheduler':     False,
    'enable_cloudfront':    os.environ['ENABLE_CF'] == 'true',
    'enable_eks':           False,
    'container_image':      os.environ['CONTAINER_IMAGE'],
    'container_port':       int(os.environ['CONTAINER_PORT']),
    'container_cpu':        256,
    'container_memory':     512,
    'ecs_launch_type':      'FARGATE',
    'ecs_desired_count':    int(os.environ['ECS_COUNT']),
    's3_bucket_name':       os.environ['S3_BUCKET'],
    's3_versioning_enabled': False,
    'alb_internal':         False,
    'health_check_path':    '/',
    'certificate_arn':      '',
    'cloudfront_origin_verify_secret': 'cloudpilot-change-me',
    'cloudfront_price_class': 'PriceClass_100',
    'cloudfront_acm_certificate_arn': '',
    'db_engine':            'mysql',
    'db_engine_version':    '8.0',
    'db_instance_class':    'db.t3.micro',
    'db_name':              os.environ['DB_NAME'],
    'db_username':          'admin',
    'db_password':          os.environ['DB_PASSWORD'],
    'db_allocated_storage': 20,
    'db_multi_az':          False,
    'db_deletion_protection': False,
    'db_backup_retention_period': 7,
    'ecr_repositories':     ['app'],
    'ec2_instance_type':    't3.medium',
    'ec2_desired_capacity': 1,
    'ec2_min_size':         1,
    'ec2_max_size':         2,
    'schedule_stop_cron':   'cron(0 20 * * ? *)',
    'schedule_start_cron':  'cron(0 8 * * ? *)',
    'schedule_desired_count': 1,
}
with open('cloudpilot.auto.tfvars.json', 'w') as f:
    json.dump(data, f, indent=2)
print('Generated cloudpilot.auto.tfvars.json')
print(json.dumps(data, indent=2))
"

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="key=cloudpilot/${{ inputs.project_id }}/terraform.tfstate" \
            -input=false -no-color

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="cloudpilot.auto.tfvars.json" \
            -input=false -no-color -out=tfplan 2>&1 | tee plan.log
          echo "### Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -40 plan.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve tfplan 2>&1 | tee apply.log

      - name: Capture Terraform Outputs
        id: out
        run: |
          terraform output -json > raw_outputs.json
          ALB=$(terraform output -raw alb_dns_name           2>/dev/null || echo "")
          ECS=$(terraform output -raw ecs_cluster_name       2>/dev/null || echo "")
          SVC=$(terraform output -raw ecs_service_name       2>/dev/null || echo "")
          S3B=$(terraform output -raw s3_bucket_name         2>/dev/null || echo "")
          CFD=$(terraform output -raw cloudfront_domain_name 2>/dev/null || echo "")
          VPC=$(terraform output -raw vpc_id                 2>/dev/null || echo "")
          echo "alb=$ALB" >> $GITHUB_OUTPUT
          echo "ecs=$ECS" >> $GITHUB_OUTPUT
          echo "svc=$SVC" >> $GITHUB_OUTPUT
          echo "s3=$S3B"  >> $GITHUB_OUTPUT
          echo "cf=$CFD"  >> $GITHUB_OUTPUT
          echo "vpc=$VPC" >> $GITHUB_OUTPUT

      - name: Build CloudPilot Outputs JSON
        env:
          PROJECT_ID:  ${{ inputs.project_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          AWS_REGION:  ${{ inputs.aws_region }}
          STACK_TYPE:  ${{ inputs.stack_type }}
          ALB_DNS:     ${{ steps.out.outputs.alb }}
          CF_DOMAIN:   ${{ steps.out.outputs.cf }}
          ECS_CLUSTER: ${{ steps.out.outputs.ecs }}
          ECS_SVC:     ${{ steps.out.outputs.svc }}
          S3_BUCKET:   ${{ steps.out.outputs.s3 }}
          VPC_ID:      ${{ steps.out.outputs.vpc }}
          RUN_ID:      ${{ github.run_id }}
        run: |
          python3 -c "
import json, os
alb = os.environ.get('ALB_DNS', '')
cf  = os.environ.get('CF_DOMAIN', '')
app_url = ('https://' + cf) if cf else ('http://' + alb) if alb else ''

with open('raw_outputs.json') as f:
    tf_out = json.load(f)

result = {
    'project_id':       os.environ['PROJECT_ID'],
    'workflow_run_id':  os.environ['RUN_ID'],
    'status':           'deployed',
    'environment':      os.environ['ENVIRONMENT'],
    'aws_region':       os.environ['AWS_REGION'],
    'stack_type':       os.environ['STACK_TYPE'],
    'app_url':          app_url,
    'alb_dns_name':     alb,
    'ecs_cluster_name': os.environ.get('ECS_CLUSTER', ''),
    'ecs_service_name': os.environ.get('ECS_SVC', ''),
    's3_bucket_name':   os.environ.get('S3_BUCKET', ''),
    'cloudfront_domain': cf,
    'vpc_id':           os.environ.get('VPC_ID', ''),
    'terraform_outputs': tf_out,
}
with open('cloudpilot-outputs.json', 'w') as f:
    json.dump(result, f, indent=2)
print(json.dumps(result, indent=2))
"

      - name: Upload Outputs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudpilot-outputs-${{ inputs.project_id }}
          path: cloudpilot-outputs.json
          retention-days: 30

      - name: Write Job Summary
        if: always()
        run: |
          echo "## CloudPilot Deploy - ${{ inputs.project_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | ${{ inputs.stack_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ inputs.aws_region }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | ${{ steps.out.outputs.alb }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ECS Cluster | ${{ steps.out.outputs.ecs }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify CloudPilot on success
        if: success() && inputs.callback_url != ''
        run: |
          curl -fsSL -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d @cloudpilot-outputs.json || echo "Callback failed (non-fatal)"

      - name: Notify CloudPilot on failure
        if: failure() && inputs.callback_url != ''
        run: |
          curl -fsSL -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"project_id\":\"${{ inputs.project_id }}\",\"workflow_run_id\":\"${{ github.run_id }}\",\"status\":\"failed\",\"error\":\"Terraform deployment failed - see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
