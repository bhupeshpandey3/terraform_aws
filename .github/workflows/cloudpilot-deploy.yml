name: "CloudPilot Deploy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "CloudPilot project UUID (state isolation key)"
        required: true
        type: string
      project_name:
        description: "Project slug (e.g. my-app)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      stack_type:
        description: "Infrastructure stack template"
        required: true
        type: choice
        options:
          - web-app
          - api-backend
          - static-site
          - microservices
        default: web-app
      aws_region:
        description: "AWS region"
        required: true
        type: string
        default: us-east-1
      container_image:
        description: "Container image URI"
        required: false
        type: string
        default: "public.ecr.aws/docker/library/nginx:stable-alpine"
      container_port:
        description: "Container port number"
        required: false
        type: string
        default: "80"
      enable_rds:
        description: "Provision RDS database (true/false)"
        required: false
        type: string
        default: "false"
      enable_cloudfront:
        description: "Provision CloudFront distribution (true/false)"
        required: false
        type: string
        default: "false"
      db_password:
        description: "Database master password (required only if enable_rds=true)"
        required: false
        type: string
        default: ""
      callback_url:
        description: "CloudPilot webhook URL for status callbacks"
        required: false
        type: string
        default: ""

jobs:
  deploy:
    name: "Deploy ${{ inputs.stack_type }} to ${{ inputs.environment }}"
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-providers-${{ inputs.aws_region }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ inputs.aws_region }}-
            terraform-providers-

      - name: Resolve networking and naming
        id: net
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          PROJECT_ID: ${{ inputs.project_id }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          AZS=$(aws ec2 describe-availability-zones \
            --region "$AWS_REGION" \
            --query 'AvailabilityZones[?State==`available`].ZoneName' \
            --output json | jq -c '.[0:2]')
          AZ1=$(echo "$AZS" | jq -r '.[0]')
          AZ2=$(echo "$AZS" | jq -r '.[1]')
          echo "az1=$AZ1" >> $GITHUB_OUTPUT
          echo "az2=$AZ2" >> $GITHUB_OUTPUT

          S3_SUFFIX=$(echo "$PROJECT_ID" | tr -d '-' | cut -c1-8)
          RAW="${PROJECT_NAME}-${S3_SUFFIX}"
          S3_NAME=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | sed 's/^-*//;s/-*$//' | cut -c1-63)
          echo "s3_bucket=$S3_NAME" >> $GITHUB_OUTPUT

          DB_NAME=$(echo "$PROJECT_NAME" | tr '-' '_' | tr -cs 'a-z0-9_' '_' | cut -c1-63)
          echo "db_name=${DB_NAME:-appdb}" >> $GITHUB_OUTPUT

      - name: Generate Terraform Variables
        id: tfvars
        env:
          ENVIRONMENT:     ${{ inputs.environment }}
          PROJECT_NAME:    ${{ inputs.project_name }}
          AWS_REGION:      ${{ inputs.aws_region }}
          CONTAINER_IMAGE: ${{ inputs.container_image }}
          CONTAINER_PORT:  ${{ inputs.container_port }}
          ENABLE_RDS:      ${{ inputs.enable_rds }}
          ENABLE_CF:       ${{ inputs.enable_cloudfront }}
          DB_PASSWORD:     ${{ inputs.db_password }}
          S3_BUCKET:       ${{ steps.net.outputs.s3_bucket }}
          DB_NAME:         ${{ steps.net.outputs.db_name }}
          AZ1:             ${{ steps.net.outputs.az1 }}
          AZ2:             ${{ steps.net.outputs.az2 }}
        run: |
          case "${{ inputs.stack_type }}" in
            web-app)       ENABLE_S3=true;  ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
            api-backend)   ENABLE_S3=false; ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
            static-site)   ENABLE_S3=true;  ENABLE_ALB=false; ENABLE_ECS=false; ENABLE_ECR=false ;;
            microservices) ENABLE_S3=true;  ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
            *)             ENABLE_S3=true;  ENABLE_ALB=true;  ENABLE_ECS=true;  ENABLE_ECR=true ;;
          esac

          [[ "$ENVIRONMENT" == "prod" ]] && ENABLE_NAT=true || ENABLE_NAT=false
          [[ "$ENVIRONMENT" == "prod" ]] && ECS_COUNT=2 || ECS_COUNT=1

          jq -n \
            --arg  environment          "$ENVIRONMENT" \
            --arg  project_name         "$PROJECT_NAME" \
            --arg  aws_region           "$AWS_REGION" \
            --arg  az1                  "$AZ1" \
            --arg  az2                  "$AZ2" \
            --arg  container_image      "$CONTAINER_IMAGE" \
            --arg  db_name              "$DB_NAME" \
            --arg  db_password          "$DB_PASSWORD" \
            --arg  s3_bucket_name       "$S3_BUCKET" \
            --argjson enable_s3         $ENABLE_S3 \
            --argjson enable_alb        $ENABLE_ALB \
            --argjson enable_ecs        $ENABLE_ECS \
            --argjson enable_ecr        $ENABLE_ECR \
            --argjson enable_rds        ${ENABLE_RDS:-false} \
            --argjson enable_nat        $ENABLE_NAT \
            --argjson enable_cf         ${ENABLE_CF:-false} \
            --argjson container_port    ${CONTAINER_PORT:-80} \
            --argjson ecs_count         $ECS_COUNT \
            '{
              environment:          $environment,
              project_name:         $project_name,
              aws_region:           $aws_region,
              vpc_cidr:             "10.0.0.0/16",
              availability_zones:   [$az1, $az2],
              public_subnet_cidrs:  ["10.0.1.0/24", "10.0.2.0/24"],
              private_subnet_cidrs: ["10.0.10.0/24", "10.0.11.0/24"],
              enable_s3:            $enable_s3,
              enable_alb:           $enable_alb,
              enable_ecs:           $enable_ecs,
              enable_ecr:           $enable_ecr,
              enable_rds:           $enable_rds,
              enable_nat_gateway:   $enable_nat,
              enable_scheduler:     false,
              enable_cloudfront:    $enable_cf,
              enable_eks:           false,
              container_image:      $container_image,
              container_port:       $container_port,
              container_cpu:        256,
              container_memory:     512,
              ecs_launch_type:      "FARGATE",
              ecs_desired_count:    $ecs_count,
              s3_bucket_name:       $s3_bucket_name,
              s3_versioning_enabled: false,
              alb_internal:         false,
              health_check_path:    "/",
              certificate_arn:      "",
              cloudfront_origin_verify_secret: "cloudpilot-change-me",
              cloudfront_price_class: "PriceClass_100",
              cloudfront_acm_certificate_arn: "",
              db_engine:            "mysql",
              db_engine_version:    "8.0",
              db_instance_class:    "db.t3.micro",
              db_name:              $db_name,
              db_username:          "admin",
              db_password:          $db_password,
              db_allocated_storage: 20,
              db_multi_az:          false,
              db_deletion_protection: false,
              db_backup_retention_period: 7,
              ecr_repositories:     ["app"],
              ec2_instance_type:    "t3.medium",
              ec2_desired_capacity: 1,
              ec2_min_size:         1,
              ec2_max_size:         2,
              schedule_stop_cron:   "cron(0 20 * * ? *)",
              schedule_start_cron:  "cron(0 8 * * ? *)",
              schedule_desired_count: 1
            }' > cloudpilot.auto.tfvars.json

          echo "--- Generated tfvars ---"
          cat cloudpilot.auto.tfvars.json

      - name: Terraform Init
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          terraform init -reconfigure \
            -backend-config="key=cloudpilot/${{ inputs.project_id }}/terraform.tfstate" \
            -input=false -no-color

      - name: Terraform Plan
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          terraform plan \
            -var-file="cloudpilot.auto.tfvars.json" \
            -parallelism=20 \
            -input=false -no-color -out=tfplan 2>&1 | tee plan.log
          echo "### Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -40 plan.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          terraform apply -parallelism=20 -input=false -auto-approve tfplan 2>&1 | tee apply.log

      - name: Capture Terraform Outputs
        id: out
        run: |
          terraform output -json > raw_outputs.json
          ALB=$(terraform output -raw alb_dns_name           2>/dev/null || echo "")
          ECS=$(terraform output -raw ecs_cluster_name       2>/dev/null || echo "")
          SVC=$(terraform output -raw ecs_service_name       2>/dev/null || echo "")
          S3B=$(terraform output -raw s3_bucket_name         2>/dev/null || echo "")
          CFD=$(terraform output -raw cloudfront_domain_name 2>/dev/null || echo "")
          VPC=$(terraform output -raw vpc_id                 2>/dev/null || echo "")
          echo "alb=$ALB" >> $GITHUB_OUTPUT
          echo "ecs=$ECS" >> $GITHUB_OUTPUT
          echo "svc=$SVC" >> $GITHUB_OUTPUT
          echo "s3=$S3B"  >> $GITHUB_OUTPUT
          echo "cf=$CFD"  >> $GITHUB_OUTPUT
          echo "vpc=$VPC" >> $GITHUB_OUTPUT

      - name: Build and upload outputs artifact
        env:
          PROJECT_ID:  ${{ inputs.project_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          AWS_REGION:  ${{ inputs.aws_region }}
          STACK_TYPE:  ${{ inputs.stack_type }}
          ALB_DNS:     ${{ steps.out.outputs.alb }}
          CF_DOMAIN:   ${{ steps.out.outputs.cf }}
          ECS_CLUSTER: ${{ steps.out.outputs.ecs }}
          ECS_SVC:     ${{ steps.out.outputs.svc }}
          S3_BUCKET:   ${{ steps.out.outputs.s3 }}
          VPC_ID:      ${{ steps.out.outputs.vpc }}
          RUN_ID:      ${{ github.run_id }}
        run: |
          APP_URL=""
          [[ -n "$CF_DOMAIN" ]] && APP_URL="https://${CF_DOMAIN}"
          [[ -z "$APP_URL" && -n "$ALB_DNS" ]] && APP_URL="http://${ALB_DNS}"

          jq -n \
            --arg project_id       "$PROJECT_ID" \
            --arg workflow_run_id  "$RUN_ID" \
            --arg environment      "$ENVIRONMENT" \
            --arg aws_region       "$AWS_REGION" \
            --arg stack_type       "$STACK_TYPE" \
            --arg app_url          "$APP_URL" \
            --arg alb_dns_name     "$ALB_DNS" \
            --arg ecs_cluster_name "$ECS_CLUSTER" \
            --arg ecs_service_name "$ECS_SVC" \
            --arg s3_bucket_name   "$S3_BUCKET" \
            --arg cloudfront_domain "$CF_DOMAIN" \
            --arg vpc_id           "$VPC_ID" \
            --slurpfile tf_out raw_outputs.json \
            '{
              project_id:       $project_id,
              workflow_run_id:  $workflow_run_id,
              status:           "deployed",
              environment:      $environment,
              aws_region:       $aws_region,
              stack_type:       $stack_type,
              app_url:          $app_url,
              alb_dns_name:     $alb_dns_name,
              ecs_cluster_name: $ecs_cluster_name,
              ecs_service_name: $ecs_service_name,
              s3_bucket_name:   $s3_bucket_name,
              cloudfront_domain: $cloudfront_domain,
              vpc_id:           $vpc_id,
              terraform_outputs: $tf_out[0]
            }' > cloudpilot-outputs.json

          echo "--- Deployment Outputs ---"
          cat cloudpilot-outputs.json

      - name: Upload Outputs Artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cloudpilot-outputs-${{ inputs.project_id }}
          path: cloudpilot-outputs.json
          retention-days: 30

      - name: Write Job Summary
        if: always()
        env:
          ALB: ${{ steps.out.outputs.alb }}
          ECS: ${{ steps.out.outputs.ecs }}
        run: |
          echo "## CloudPilot Deploy - ${{ inputs.project_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | ${{ inputs.stack_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ inputs.aws_region }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | $ALB |" >> $GITHUB_STEP_SUMMARY
          echo "| ECS Cluster | $ECS |" >> $GITHUB_STEP_SUMMARY

      - name: Notify CloudPilot on success
        if: success() && inputs.callback_url != ''
        run: |
          curl -fsSL -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d @cloudpilot-outputs.json || echo "Callback failed (non-fatal)"

      - name: Notify CloudPilot on failure
        if: failure() && inputs.callback_url != ''
        run: |
          curl -fsSL -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"project_id\":\"${{ inputs.project_id }}\",\"workflow_run_id\":\"${{ github.run_id }}\",\"status\":\"failed\",\"error\":\"Terraform deployment failed\"}" || true
