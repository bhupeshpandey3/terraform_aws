name: CloudPilot Test Python Run

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "CloudPilot project UUID"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ inputs.project_id }}
      ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - name: Generate vars
        run: |
          python3 -c "
import json, os
data = {
    'environment': os.environ['ENVIRONMENT'],
    'project_id':  os.environ['PROJECT_ID'],
    'enable_s3':   False,
    'enable_alb':  True,
}
with open('test.json', 'w') as f:
    json.dump(data, f, indent=2)
print(json.dumps(data, indent=2))
"