name: Drift Detection

on:
  schedule:
    - cron: '0 6 * * MON-FRI'   # 06:00 UTC every weekday
  workflow_dispatch:              # allow manual trigger

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: '1.10.5'

jobs:
  detect:
    name: Detect drift — ${{ matrix.environment }}
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            stack: ${{ vars.TF_STACK || 'web-app' }}
          - environment: staging
            stack: ${{ vars.TF_STACK || 'web-app' }}
          - environment: prod
            stack: ${{ vars.TF_STACK || 'web-app' }}

    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
            -input=false -no-color

      - name: Terraform Plan (drift check)
        id: plan
        run: |
          terraform plan \
            -var-file="stacks/${{ matrix.stack }}.tfvars" \
            -var-file="environments/${{ matrix.environment }}.tfvars" \
            -detailed-exitcode -no-color 2>&1 | tee plan.txt

          # Exit codes: 0 = no changes, 1 = error, 2 = changes detected
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open issue if drift detected
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs')
            const env  = '${{ matrix.environment }}'
            const plan = fs.readFileSync('plan.txt', 'utf8')
            const body = plan.length > 60000
              ? plan.slice(0, 60000) + '\n...(truncated)'
              : plan

            // Check for an existing open drift issue for this env
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: [`drift:${env}`],
            })

            const title = `🚨 Infrastructure drift detected in \`${env}\``

            if (issues.length > 0) {
              // Add a comment to the existing issue instead of opening a duplicate
              await github.rest.issues.createComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                issue_number: issues[0].number,
                body: `**Drift still present** (${new Date().toISOString()})\n\`\`\`hcl\n${body}\n\`\`\``,
              })
            } else {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                labels: [`drift:${env}`],
                body: `Scheduled drift detection found unexpected changes in **${env}**.\n\nRun \`./tf.sh ${{ matrix.stack }} ${env} apply\` to reconcile, or update the Terraform code to match the intended state.\n\n**Plan output:**\n\`\`\`hcl\n${body}\n\`\`\``,
              })
            }

      - name: Fail job if drift detected
        if: steps.plan.outputs.exitcode == '2' || steps.plan.outputs.exitcode == '1'
        run: |
          echo "Drift detected or plan errored. See issue for details."
          exit 1
