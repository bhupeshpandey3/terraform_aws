name: "CloudPilot Destroy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "CloudPilot project UUID"
        required: true
        type: string
      project_name:
        description: "Project slug"
        required: true
        type: string
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      stack_type:
        description: "Infrastructure stack type"
        required: true
        type: choice
        options:
          - web-app
          - api-backend
          - static-site
          - microservices
        default: web-app
      aws_region:
        description: "AWS region"
        required: true
        type: string
        default: us-east-1
      callback_url:
        description: "CloudPilot webhook URL for status callbacks"
        required: false
        type: string
        default: ""

jobs:
  destroy:
    name: "Destroy ${{ inputs.project_name }} (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Generate Minimal Destroy Variables
        env:
          ENVIRONMENT:  ${{ inputs.environment }}
          PROJECT_NAME: ${{ inputs.project_name }}
          AWS_REGION:   ${{ inputs.aws_region }}
        run: |
          python3 -c "
import json, os
region = os.environ['AWS_REGION']
data = {
    'environment':          os.environ['ENVIRONMENT'],
    'project_name':         os.environ['PROJECT_NAME'],
    'aws_region':           region,
    'vpc_cidr':             '10.0.0.0/16',
    'availability_zones':   [region + 'a', region + 'b'],
    'public_subnet_cidrs':  ['10.0.1.0/24', '10.0.2.0/24'],
    'private_subnet_cidrs': ['10.0.10.0/24', '10.0.11.0/24'],
    'enable_s3':            True,
    'enable_alb':           True,
    'enable_ecs':           True,
    'enable_ecr':           True,
    'enable_rds':           False,
    'enable_nat_gateway':   False,
    'enable_scheduler':     False,
    'enable_cloudfront':    False,
    'enable_eks':           False,
    'container_image':      'public.ecr.aws/docker/library/nginx:stable-alpine',
    'container_port':       80,
    'container_cpu':        256,
    'container_memory':     512,
    'ecs_launch_type':      'FARGATE',
    'ecs_desired_count':    1,
    's3_bucket_name':       'placeholder-destroy-only',
    's3_versioning_enabled': False,
    'alb_internal':         False,
    'health_check_path':    '/',
    'certificate_arn':      '',
    'cloudfront_origin_verify_secret': 'placeholder',
    'cloudfront_price_class': 'PriceClass_100',
    'cloudfront_acm_certificate_arn': '',
    'db_name':              'placeholder',
    'db_username':          'admin',
    'db_password':          'placeholder',
    'db_engine':            'mysql',
    'db_engine_version':    '8.0',
    'db_instance_class':    'db.t3.micro',
    'db_allocated_storage': 20,
    'db_multi_az':          False,
    'db_deletion_protection': False,
    'db_backup_retention_period': 7,
    'ecr_repositories':     ['app'],
    'ec2_instance_type':    't3.medium',
    'ec2_desired_capacity': 1,
    'ec2_min_size':         1,
    'ec2_max_size':         2,
    'schedule_stop_cron':   'cron(0 20 * * ? *)',
    'schedule_start_cron':  'cron(0 8 * * ? *)',
    'schedule_desired_count': 1,
}
with open('cloudpilot.auto.tfvars.json', 'w') as f:
    json.dump(data, f, indent=2)
print('Generated destroy tfvars')
"

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="key=cloudpilot/${{ inputs.project_id }}/terraform.tfstate" \
            -input=false -no-color

      - name: Terraform Plan Destroy
        run: |
          terraform plan -destroy \
            -var-file="cloudpilot.auto.tfvars.json" \
            -input=false -no-color 2>&1 | tee destroy-plan.log
          echo "### Terraform Destroy Plan - ${{ inputs.project_name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 destroy-plan.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="cloudpilot.auto.tfvars.json" \
            -input=false -auto-approve 2>&1 | tee destroy.log

      - name: Notify CloudPilot on success
        if: success() && inputs.callback_url != ''
        run: |
          curl -fsSL -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"project_id\":\"${{ inputs.project_id }}\",\"workflow_run_id\":\"${{ github.run_id }}\",\"status\":\"destroyed\"}" || true

      - name: Notify CloudPilot on failure
        if: failure() && inputs.callback_url != ''
        run: |
          curl -fsSL -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"project_id\":\"${{ inputs.project_id }}\",\"workflow_run_id\":\"${{ github.run_id }}\",\"status\":\"failed\",\"error\":\"Destroy failed - see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
