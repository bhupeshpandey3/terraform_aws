name: Terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
  pull_request:
    paths: ['**.tf', '**.tfvars', 'stacks/**', '.github/workflows/infra.yml']
  push:
    branches: [main, staging, develop]
    paths: ['**.tf', '**.tfvars', 'stacks/**']

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.10.5'

jobs:
  set-env:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      stack: ${{ steps.ctx.outputs.stack }}
    steps:
      - id: ctx
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            REF="${{ github.base_ref || github.ref_name }}"
            case "$REF" in
              prod)    echo "environment=prod"    >> $GITHUB_OUTPUT ;;
              staging) echo "environment=staging" >> $GITHUB_OUTPUT ;;
              *)       echo "environment=dev"     >> $GITHUB_OUTPUT ;;
            esac
          fi
          echo "stack=${{ vars.TF_STACK || 'web-app' }}" >> $GITHUB_OUTPUT

  plan:
    needs: set-env
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: ${{ needs.set-env.outputs.environment }}
    env:
      ENV: ${{ needs.set-env.outputs.environment }}
      STACK: ${{ needs.set-env.outputs.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ env.ENV }}/terraform.tfstate" -input=false

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="stacks/${{ env.STACK }}.tfvars" \
            -var-file="environments/${{ env.ENV }}.tfvars" \
            -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs')
            let plan = fs.readFileSync('plan.txt', 'utf8')
            if (plan.length > 60000) plan = plan.slice(0, 60000) + '\n...(truncated — see Actions log for full output)'
            const status = '${{ steps.plan.outputs.exitcode }}' === '0' ? 'Plan OK' : 'Plan FAILED'
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${status} — \`${{ env.STACK }}\` on \`${{ env.ENV }}\`\n\`\`\`hcl\n${plan}\n\`\`\``
            })

      - name: Print plan summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### Terraform Plan — ${{ env.STACK }} on ${{ env.ENV }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  apply:
    needs: [set-env, plan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: ${{ needs.set-env.outputs.environment }}
    concurrency:
      group: terraform-apply-${{ needs.set-env.outputs.environment }}
      cancel-in-progress: false
    env:
      ENV: ${{ needs.set-env.outputs.environment }}
      STACK: ${{ needs.set-env.outputs.stack }}
      TF_BUCKET: myapp-tfstate-685197708357
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Clear stale state lock
        run: |
          aws s3 rm "s3://${{ env.TF_BUCKET }}/${{ env.ENV }}/terraform.tfstate.tflock" \
            --region ${{ vars.AWS_REGION }} 2>/dev/null || true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ env.ENV }}/terraform.tfstate" -input=false

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var-file="stacks/${{ env.STACK }}.tfvars" \
            -var-file="environments/${{ env.ENV }}.tfvars"
